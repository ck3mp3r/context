pre-commit:
  commands:
    trailing-whitespace:
      run: >
        git diff --cached --name-only --diff-filter=ACM |
        xargs -I {} sh -c 'sed -i "" "s/[[:space:]]*$//" "$1" && git add "$1"' _ {}
      glob: "*.{rs,nix,toml,yml,yaml,md,json,js,css,html}"
    rustfmt:
      run: cargo fmt -- --check
      glob: "*.rs"
    clippy:
      run: cargo clippy -- -D warnings
      glob: "*.rs"
    nix-fmt:
      run: nix fmt .
      glob: "*.nix"

pre-push:
  commands:
    tests:
      run: cargo test
