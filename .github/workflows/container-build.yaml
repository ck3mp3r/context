name: Build and Push Containers

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag, or commit SHA)"
        required: false
        type: string
        default: ""
      push_latest:
        description: "Whether to push :latest tag"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to checkout (branch, tag, or commit SHA)"
        required: false
        type: string
        default: ""
      push_latest:
        description: "Push :latest tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-containers:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            docker_arch: amd64
            runner: ubuntu-24.04
          - arch: aarch64-linux
            docker_arch: arm64
            runner: ubuntu-24.04-arm
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }} container
        run: |
          nix build .#container --system ${{ matrix.arch }} && cat result | docker load

          docker tag context:${{ steps.version.outputs.version }} ghcr.io/${{ github.repository_owner }}/context:${{ steps.version.outputs.version }}-${{ matrix.docker_arch }}
          docker push ghcr.io/${{ github.repository_owner }}/context:${{ steps.version.outputs.version }}-${{ matrix.docker_arch }}

  create-manifest:
    runs-on: ubuntu-24.04
    needs: build-containers
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION=${{ needs.build-containers.outputs.version }}
          REPO=ghcr.io/${{ github.repository_owner }}/context

          # Pull architecture-specific images
          docker pull $REPO:$VERSION-amd64
          docker pull $REPO:$VERSION-arm64

          # Create versioned multi-arch manifest
          docker manifest create $REPO:$VERSION \
            $REPO:$VERSION-amd64 \
            $REPO:$VERSION-arm64
          docker manifest push $REPO:$VERSION

          # Optionally create :latest multi-arch manifest
          if [ "${{ inputs.push_latest }}" = "true" ]; then
            docker manifest create $REPO:latest --amend \
              $REPO:$VERSION-amd64 \
              $REPO:$VERSION-arm64
            docker manifest push $REPO:latest
          fi
