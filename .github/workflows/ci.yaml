---
name: CI Rust Build
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - "**/*.nix"
      - "Cargo.lock"
      - "Cargo.toml"
      - "flake.lock"
      - "flake.nix"
      - "src/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v7

      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{github.token}}

      - name: Build and test
        env:
          NIX_CONFIG: "access-tokens = github.com=${{ github.token }}"
        run: nix develop .#ci --command cargo test --no-default-features --features backend
